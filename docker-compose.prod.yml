# Production: pull pre-built image from GHCR (see .github/workflows/cd.yml)
services:
  app:
    image: ${APP_IMAGE:?Set APP_IMAGE to ghcr.io/owner/repo:latest}
    ports:
      - "8080:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    volumes:
      - ./storage:/var/www/html/storage
