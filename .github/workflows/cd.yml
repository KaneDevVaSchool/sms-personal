name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy (placeholder)
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build Docker image
        run: docker build -t ops-platform:ci .

      - name: Deploy placeholder
        run: |
          echo "Configure deployment here (Laravel Forge, Envoyer, SSH, Docker, etc.)."
          echo "Example: rsync or forge deploy hook using secrets.DEPLOY_KEY / FORGE_WEBHOOK_URL."

